# nginx.conf — Host Nginx para el Visor de Planos
# Sirve el visor estático (dist/) + proxy al API en contenedor + TLS.
# Copiar a /etc/nginx/conf.d/planos.conf

# Redirección HTTP → HTTPS
server {
    listen 80;
    server_name planos.aicsacorp.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name planos.aicsacorp.com;

    # ── TLS (usa tu CA interna) ──────────────────────────────────────────
    ssl_certificate     /etc/nginx/tls/planos.crt;
    ssl_certificate_key /etc/nginx/tls/planos.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # ── Cabeceras de seguridad ───────────────────────────────────────────
    # frame-ancestors limita QUIÉN puede embeber el visor (solo el portal APEX)
    add_header Content-Security-Policy "default-src 'self'; frame-ancestors https://saf.aicsacorp.com; img-src 'self' data: blob:; worker-src 'self' blob:; object-src 'none'; base-uri 'self'" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "same-origin" always;

    client_max_body_size 10m;   # XFDF/JSON grandes

    # ── Visor estático (build de Vite, base:'/planos/') ──────────────────
    location /planos/ {
        alias /var/www/saf/planos/;
        try_files $uri $uri/ /planos/index.html;

        # Headers que requiere el Worker de PDF.js
        add_header Cross-Origin-Opener-Policy   "same-origin"   always;
        add_header Cross-Origin-Embedder-Policy "require-corp"  always;
    }

    # ── PDFs de los planos (solo lectura) ────────────────────────────────
    location /pdfs/ {
        alias /var/www/saf/pdfs/;
    }

    # ── API REST → contenedor Podman (publicado en loopback) ─────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
