# ──────────────────────────────────────────────────────────────────────────
# nginx-ords.conf — Proxy inverso para ORDS (Opción A: elimina CORS)
#
# QUÉ HACE: el visor llama a rutas RELATIVAS (/ords/safws/...) en su propio
#   origen (http://192.168.50.163). nginx reenvía esas peticiones a ORDS por
#   detrás. Navegador y API quedan en el MISMO origen → no hay preflight ni CORS.
#
# REQUISITO en el frontend:  VITE_ORDS_BASE=/ords/safws  (ya configurado en
#   .env.development y .env.production). Recompilar: npm run build.
#
# CÓMO USAR: pega este bloque DENTRO del mismo `server { ... }` que sirve el
#   visor (el que tiene `location /planos/`). Luego:  nginx -t && nginx -s reload
# ──────────────────────────────────────────────────────────────────────────

# IMPORTANTE: nginx ELIMINA por defecto los headers HTTP con guion bajo
# (p.ej. codigo_proyecto). Sin esto, esos headers llegan NULOS a ORDS.
# Esta directiva va a nivel `server { ... }` (NO dentro de un location).
underscores_in_headers on;

location /ords/ {
    # Reenvía al upstream los headers del cliente (incluidos los de guion bajo).
    proxy_pass_request_headers on;

    # Upstream real de ORDS (cambia el host si mueves ORDS; NO hay que recompilar el visor).
    proxy_pass              https://dev.aicsacorp.com/ords/;

    # ORDS enruta según el Host → debe ser el del upstream, no el del visor.
    proxy_set_header        Host dev.aicsacorp.com;
    # SNI: necesario para el handshake TLS contra el upstream HTTPS.
    proxy_ssl_server_name   on;

    proxy_set_header        X-Real-IP         $remote_addr;
    proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header        X-Forwarded-Proto $scheme;

    # PDFs/markup grandes: margen de tiempo y cuerpos amplios.
    proxy_read_timeout      120s;
    client_max_body_size    20m;
}
