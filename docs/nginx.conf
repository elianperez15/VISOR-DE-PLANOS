# ============================================
# default.conf — Oracle Linux 10.X · SPA en raíz "/" · detrás de Cloudflare
# Certificado: wildcard *.aicsacorp.com (Sectigo)
# ============================================

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ============================================
# HTTP :80 — Redirección a HTTPS (+ ACME challenge)
# Solo sirve el reto ACME por HTTP; todo lo demás → 301 a HTTPS.
# ============================================
server {
    listen 80;
    listen [::]:80;

    server_name _;

    # ACME challenge — DEBE seguir accesible por HTTP para renovar el certificado
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    # Todo lo demás se fuerza a HTTPS conservando ruta y query string.
    location / {
        return 301 https://$host$request_uri;
    }
}

# ============================================
# HTTPS :443 — TLS con wildcard *.aicsacorp.com
# ============================================
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;

    server_name _;

    root /usr/share/nginx/html/planos;
    index index.html;
    absolute_redirect off;

    # IMPORTANTE: nginx ELIMINA por defecto los headers HTTP con guion bajo
    # (p.ej. codigo_proyecto). Sin esto, esos headers llegan NULOS a ORDS.
    underscores_in_headers on;

    # --- Certificado wildcard *.aicsacorp.com (Sectigo) ---
    ssl_certificate     /etc/nginx/ssl/origin.pem;
    ssl_certificate_key /etc/nginx/ssl/origin.key;

    # --- Parámetros TLS (perfil moderno/intermedio) ---
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # HSTS — forzar HTTPS en el navegador (1 año)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    include /etc/nginx/conf.d/security-headers.inc;
    limit_req zone=req_limit burst=20 nodelay;
    limit_conn conn_limit 10;

       location /ords/ {
        # Reenvía al upstream los headers del cliente (incluidos los de guion bajo).
        proxy_pass_request_headers on;
        proxy_pass              https://dev.aicsacorp.com/ords/;
        proxy_set_header        Host dev.aicsacorp.com;
        proxy_ssl_server_name   on;
        proxy_set_header        X-Real-IP         $remote_addr;
        proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;
        proxy_read_timeout      120s;
        client_max_body_size    20m;
    }

    # Compatibilidad: enlaces antiguos a /planos/ → raíz (preserva el query string).
    location = /planos { return 301 /; }
    location /planos/   { return 301 /; }

    # La aplicación vive en la raíz (con fallback SPA interno).
    location / {
        limit_except GET HEAD { deny all; }
        try_files $uri $uri/ /index.html;
    }

    location /health {
        access_log off;
        default_type text/plain;
        return 200 "healthy\n";
    }

    location = /favicon.ico {
        log_not_found off;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, immutable";
        include /etc/nginx/conf.d/security-headers.inc;
    }

    location = /robots.txt {
        log_not_found off;
        access_log off;
        expires 7d;
    }

     location ~* \.(?:html?)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        expires epoch;
        include /etc/nginx/conf.d/security-headers.inc;
    }

    location ~ "\.[0-9a-f]{8,}\.(js|css|png|jpg|jpeg|gif|webp|svg|woff|woff2|ttf|otf|eot|ico)$" {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        access_log off;
        include /etc/nginx/conf.d/security-headers.inc;
    }

    location ~* \.(css|js)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000" always;
        include /etc/nginx/conf.d/security-headers.inc;
    }

    location ~* \.(jpg|jpeg|png|gif|webp|svg|ico)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000" always;
        access_log off;
        include /etc/nginx/conf.d/security-headers.inc;
    }

    location ~* \.(woff|woff2|ttf|otf|eot)$ {
        add_header Access-Control-Allow-Origin "*" always;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        access_log off;
        include /etc/nginx/conf.d/security-headers.inc;
    }

    location ~ /\.(?!well-known) {
        deny all;
        return 404;
    }

        location @custom_404_ssl {
        default_type text/html;
        return 404 '<!DOCTYPE html><html><head><title>Not Found</title></head><body><h1>404 - Not Found</h1></body></html>';
    }
    error_page 404 = @custom_404_ssl;

    location /rt/ {
        proxy_pass         http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_set_header   Host $host;
        proxy_read_timeout 3600s;
    }
}
